name: Build APK from ZIP

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Extract ZIP project
        run: |
          set -eux
          ZIP_FILE="$(ls *.zip | head -n 1)"
          echo "Using ZIP: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d extracted
          PROJECT_DIR="$(find extracted -maxdepth 3 -name settings.gradle.kts -exec dirname {} \; | head -n 1)"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          ls -la "$PROJECT_DIR"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          gradle :app:assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoReplyKotlinLocal-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
